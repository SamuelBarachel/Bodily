services:
  - type: web
    name: bodily-api
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/mobile run build:web
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: EXPO_PUBLIC_API_URL
        fromService:
          type: web
          name: bodily-api
          property: host
