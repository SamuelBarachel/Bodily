services:
  - type: web
    name: bodily-api
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start

  - type: web
    name: bodily-frontend
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/mobile run build
    startCommand: pnpm --filter @workspace/mobile run serve
