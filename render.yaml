databases:
  - name: bodily-db
    databaseName: bodily
    user: bodily_user
    plan: free

services:
  - type: web
    name: bodily-api
    env: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bodily-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: bodily-frontend
    env: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/mobile run build
    startCommand: pnpm --filter @workspace/mobile run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXPO_PUBLIC_API_URL
        fromService:
          type: web
          name: bodily-api
          property: host
